# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General ──────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── True color ───────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── Keybindings ──────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Copy mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ── Status bar (Kanagawa Dragon) ─────────────────────────────────────────────
set -g status-style "bg=#1F1F28,fg=#C8C093"
set -g status-left " #S "
set -g status-left-style "bg=#363646,fg=#7E9CD8,bold"
set -g status-right " %H:%M "
set -g status-right-style "bg=#363646,fg=#727169"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#2D4F67,fg=#7FB4CA,bold"
