# Core Model Selection
################################################################################

model = "gpt-5.5"

# personality = "pragmatic"

# review_model = "gpt-5.5"

model_provider = "openai"

# oss_provider = "ollama"

# service_tier = "flex"

# model_context_window = 128000
# model_auto_compact_token_limit = 64000
# tool_output_token_limit = 12000
# model_catalog_json = "/absolute/path/to/models.json"
# background_terminal_max_timeout = 300000
# log_dir = "/absolute/path/to/codex-logs"
# sqlite_home = "/absolute/path/to/codex-state"

################################################################################
# Reasoning & Verbosity
################################################################################

# model_reasoning_effort = "medium"
# plan_mode_reasoning_effort = "high"
# model_reasoning_summary = "auto"
# model_verbosity = "medium"
# model_supports_reasoning_summaries = true

################################################################################
# Instruction Overrides
################################################################################

# developer_instructions = ""
# compact_prompt = ""
# commit_attribution = "Jane Doe <jane@example.com>"
# model_instructions_file = "/absolute/or/relative/path/to/instructions.txt"
# experimental_compact_prompt_file = "/absolute/or/relative/path/to/compact_prompt.txt"

################################################################################
# Notifications
################################################################################

# notify = ["notify-send", "Codex"]

################################################################################
# Approval & Sandbox
################################################################################

approval_policy = "on-request"

# approvals_reviewer = "user"

# approval_policy = { granular = {
#   sandbox_approval = true,
#   rules = true,
#   mcp_elicitations = true,
#   request_permissions = false,
#   skill_approval = false
# } }

allow_login_shell = true

sandbox_mode = "workspace-write"

# default_permissions = ":workspace"

################################################################################
# Authentication & Login
################################################################################

cli_auth_credentials_store = "file"

chatgpt_base_url = "https://chatgpt.com/backend-api/"

# openai_base_url = "https://us.api.openai.com/v1"
# forced_chatgpt_workspace_id = "00000000-0000-0000-0000-000000000000"
# forced_login_method = "chatgpt"

mcp_oauth_credentials_store = "auto"

# mcp_oauth_callback_port = 4321
# mcp_oauth_callback_url = "https://devbox.example.internal/callback"

################################################################################
# Project Documentation Controls
################################################################################

project_doc_max_bytes = 32768
project_doc_fallback_filenames = []
# project_root_markers = [".git"]

################################################################################
# History & File Opener
################################################################################

file_opener = "cursor"

################################################################################
# UI, Notifications, and Misc
################################################################################

hide_agent_reasoning = false
show_raw_agent_reasoning = false
disable_paste_burst = false
windows_wsl_setup_acknowledged = false
check_for_update_on_startup = true

################################################################################
# Web Search
################################################################################

web_search = "cached"

################################################################################
# Agents
################################################################################

[agents]

# max_threads = 6
# max_depth = 1
# job_max_runtime_seconds = 1800

################################################################################
# Skills
################################################################################

[[skills.config]]

# path = "/path/to/skill/SKILL.md"
# enabled = false

################################################################################
# Sandbox settings
################################################################################

[sandbox_workspace_write]
writable_roots = []
network_access = false
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

################################################################################
# Shell Environment Policy
################################################################################

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false
exclude = []
set = {}
include_only = []
experimental_use_profile = false

################################################################################
# History
################################################################################

[history]
persistence = "save-all"
# max_bytes = 5242880

################################################################################
# TUI
################################################################################

[tui]
notifications = false
# notification_method = "auto"
# notification_condition = "unfocused"
animations = true
show_tooltips = true
# alternate_screen = "auto"
# status_line = ["model", "context-remaining", "git-branch"]
# terminal_title = ["spinner", "project"]
# theme = "catppuccin-mocha"

[tui.model_availability_nux]
"gpt-5.5" = 1

################################################################################
# Analytics & Feedback
################################################################################

[analytics]
enabled = true

[feedback]
enabled = true

################################################################################
# Notices
################################################################################

[notice]

# hide_full_access_warning = true
# hide_world_writable_warning = true
# hide_rate_limit_model_nudge = true
# hide_gpt5_1_migration_prompt = true

