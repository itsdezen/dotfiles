# starship.toml — Cấu hình Starship prompt
# Docs: https://starship.rs/config/

# Format chung
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character"""

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead  = "⇡${count}"
behind = "⇣${count}"
staged = "[+${count}](green)"
modified = "[~${count}](yellow)"
untracked = "[?${count}](red)"

# ── Node.js ──────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]

# ── Python ───────────────────────────────────────────────────────────────────
[python]
symbol = " "
style = "bold yellow"

# ── Thời gian chạy lệnh ──────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000   # Hiện khi lệnh chạy > 2 giây
style = "bold yellow"
format = " [$duration]($style)"

# ── Ký tự prompt ─────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
