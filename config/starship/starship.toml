# -----------------------------
# USERNAME
# -----------------------------
[username]
show_always = false
style_user = "bg:#FAFAFA fg:#0A0A0A"
style_root = "bg:#FAFAFA fg:#0A0A0A"
format = '[$user ]($style)'
disabled = false

# -----------------------------
# DIRECTORY
# -----------------------------
[directory]
style = "bg:#D4D4D4 fg:#111111"
