"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "dragon"

format = """
[εé╢](gray_1)\
$os\
$username\
[εé┤](fg:gray_1 bg:gray_2)\
$directory\
$nodejs\
$bun\
$python\
$rust\
$golang\
$git_branch\
$git_status\
${custom.gray2_close}\
$docker_context\
$cmd_duration\
$character\
"""

[palettes.dragon]
# grayscale prompt shell
gray_1 = "#F0F0F0"
gray_2 = "#B0B0B0"
gray_3 = "#707070"
gray_4 = "#303030"
ink = "#0A0A0A"
ink_soft = "#111111"
# kanagawa-dragon ANSI palette, same hex Ghostty renders for this theme
green = "#87A987"     # ANSI 10 bright green (success)
yellow = "#C4B28A"    # ANSI 3 yellow
aqua = "#7AA89F"      # ANSI 14 bright cyan
red = "#E46876"       # ANSI 9 bright red (error)
red_deep = "#C4746E"  # ANSI 1 red
blue = "#7FB4CA"      # ANSI 12 bright blue
violet = "#938AA9"    # ANSI 13 bright magenta
gold = "#E6C384"      # ANSI 11 bright yellow
pink = "#A292A3"      # ANSI 5 magenta
# darkened runtime hues ΓÇö legible on the light gray_2 pill
node_dark = "#3E5A3E"
bun_dark = "#8A6A1E"
python_dark = "#6E5E2E"
rust_dark = "#8E3F3A"
go_dark = "#2F5E72"

# -----------------------------
# OS
# -----------------------------
[os]
disabled = false
style = "bg:gray_1 fg:ink"
format = '[ $symbol ]($style)'

[os.symbols]
Macos = "∩à╣"
Ubuntu = "∩î¢"
Windows = "≤░ì▓"
Arch = "∩îâ"
Fedora = "∩îè"
Debian = "∩îå"

# -----------------------------
# USERNAME
# -----------------------------
[username]
show_always = false
style_user = "bg:gray_1 fg:ink"
style_root = "bg:gray_1 fg:ink"
format = '[$user ]($style)'
disabled = false

# -----------------------------
# DIRECTORY
# -----------------------------
[directory]
style = "bg:gray_2 fg:ink_soft"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_os_path_sep = true
home_symbol = "≤░ï£ ~"
truncation_symbol = "ΓÇª/"

[directory.substitutions]
"Developer" = "≤░▓ï Developer"
"Projects" = "≤▒îú Projects"
"Workspace" = "≤▒é¼ Workspace"
"Code" = "≤░¿₧ Code"
"Repos" = "≤░│Å Repos"
"Documents" = "≤▒é╖ Documents"
"Downloads" = "≤░ëì Downloads"
"Music" = "≤▒ìÖ Music"
"Pictures" = "≤░ëÅ Pictures"
"Desktop" = "≤░ƒÇ Desktop"
".config" = "εÿò .config"
".git" = "≤░èó .git"


# -----------------------------
# LANGUAGE RUNTIMES (mise-managed)
# -----------------------------
[nodejs]
style = "bg:gray_2 fg:node_dark"
format = '[$symbol$version]($style)'

[bun]
style = "bg:gray_2 fg:bun_dark"
format = '[$symbol$version]($style)'

[python]
style = "bg:gray_2 fg:python_dark"
format = '[$symbol$version]($style)'

[rust]
style = "bg:gray_2 fg:rust_dark"
format = '[$symbol$version]($style)'

[golang]
style = "bg:gray_2 fg:go_dark"
format = '[$symbol$version]($style)'

# -----------------------------
# GIT
# -----------------------------
[git_branch]
symbol = "∩Éÿ"
style = "bg:gray_3 fg:gray_1"
format = '[εé┤](fg:gray_2 bg:gray_3)[ $symbol $branch ]($style)'

[git_status]
style = "bg:gray_3"
format = '([$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style))[εé┤](fg:gray_3)'

staged = '[+${count} ](bold green bg:gray_3)'
modified = '[!${count} ](bold yellow bg:gray_3)'
untracked = '[?${count} ](bold aqua bg:gray_3)'
deleted = '[Γ£ÿ${count} ](bold red bg:gray_3)'
renamed = '[ΓåÆ ](bold blue bg:gray_3)'
conflicted = '[ΓÜæ ](bold violet bg:gray_3)'
stashed = '[Γëí${count} ](bold pink bg:gray_3)'

ahead = '[Γçí${count} ](bold green bg:gray_3)'
behind = '[Γçú${count} ](bold red_deep bg:gray_3)'
diverged = '[ΓçòΓçí${ahead_count}Γçú${behind_count} ](bold gold bg:gray_3)'

# -----------------------------
# DOCKER
# -----------------------------
[docker_context]
symbol = "∩îê"
style = "bg:gray_4 fg:gray_1"
format = ' [εé╢](gray_4)[ $symbol $context ]($style)[εé┤](fg:gray_4)'

# -----------------------------
# COMMAND DURATION
# -----------------------------
[cmd_duration]
min_time = 2_000
format = ' [$duration]($style)'
style = "bold gold"

# -----------------------------
# CHARACTER (prompt symbol)
# -----------------------------
[character]
success_symbol = " [ΓÇó](bold green)"
error_symbol = " [ΓÇó](bold red)"
vimcmd_symbol = " [ΓÇó](bold green)"

# -----------------------------
# GRAY_2 CLOSE
# rounds off the gray_2 pill when NOT in a git repo
# (in a repo, git_branch/git_status own the gray_3 caps instead)
# -----------------------------
[custom.gray2_close]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[εé┤](fg:gray_2)"
