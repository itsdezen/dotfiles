"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "dragon"

format = """
[î‚¶](gray_1)\
$os\
$username\
[î‚´](fg:gray_1 bg:gray_2)\
$directory\
$nodejs\
$bun\
$python\
$rust\
$golang\
[î‚´](fg:gray_2 bg:gray_3)\
$git_branch\
$git_status\
[î‚´ ](fg:gray_3)\
$docker_context\
$cmd_duration\
$character\
"""

[palettes.dragon]
# grayscale prompt shell
gray_1 = "#FAFAFA"
gray_2 = "#D4D4D4"
gray_3 = "#A3A3A3"
gray_4 = "#525252"
ink = "#0A0A0A"
ink_soft = "#111111"
# kanagawa-dragon ANSI palette, same hex Ghostty renders for this theme
green = "#87A987"     # ANSI 10 bright green (success)
yellow = "#C4B28A"    # ANSI 3 yellow
aqua = "#7AA89F"      # ANSI 14 bright cyan
red = "#E46876"       # ANSI 9 bright red (error)
red_deep = "#C4746E"  # ANSI 1 red
blue = "#7FB4CA"      # ANSI 12 bright blue
violet = "#938AA9"    # ANSI 13 bright magenta
gold = "#E6C384"      # ANSI 11 bright yellow
pink = "#A292A3"      # ANSI 5 magenta

# -----------------------------
# OS
# -----------------------------
[os]
disabled = false
style = "bg:gray_1 fg:ink"
format = '[ $symbol ]($style)'

[os.symbols]
Macos = "ï…¹"
Ubuntu = "ïŒ›"
Windows = "َ°چ²"
Arch = "ïŒƒ"
Fedora = "ïŒٹ"
Debian = "ïŒ†"

# -----------------------------
# USERNAME
# -----------------------------
[username]
show_always = false
style_user = "bg:gray_1 fg:ink"
style_root = "bg:gray_1 fg:ink"
format = '[$user ]($style)'
disabled = false

# -----------------------------
# DIRECTORY
# -----------------------------
[directory]
style = "bg:gray_2 fg:ink_soft"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_os_path_sep = true
home_symbol = "َ°‹œ ~"
truncation_symbol = "â€¦/"

[directory.substitutions]
"Developer" = "َ°²‹ Developer"
"Projects" = "َ±Œ£ Projects"
"Workspace" = "َ±‚¬ Workspace"
"Code" = "َ°¨‍ Code"
"Repos" = "َ°³ڈ Repos"
"Documents" = "َ±‚· Documents"
"Downloads" = "َ°‰چ Downloads"
"Music" = "َ±چ™ Music"
"Pictures" = "َ°‰ڈ Pictures"
"Desktop" = "َ°ں€ Desktop"
".config" = "îک• .config"
".git" = "َ°ٹ¢ .git"


# -----------------------------
# LANGUAGE RUNTIMES (mise-managed)
# -----------------------------
[nodejs]
style = "bg:gray_2 fg:green"
format = '[ $symbol $version ]($style)'

[bun]
style = "bg:gray_2 fg:gold"
format = '[ $symbol $version ]($style)'

[python]
style = "bg:gray_2 fg:yellow"
format = '[ $symbol $version ]($style)'

[rust]
style = "bg:gray_2 fg:red_deep"
format = '[ $symbol $version ]($style)'

[golang]
style = "bg:gray_2 fg:blue"
format = '[ $symbol $version ]($style)'

# -----------------------------
# GIT
# -----------------------------
[git_branch]
symbol = "ïگک"
style = "bg:gray_3 fg:gray_1"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:gray_3"
format = '([$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style))'

staged = '[+${count} ](bold green bg:gray_3)'
modified = '[!${count} ](bold yellow bg:gray_3)'
untracked = '[?${count} ](bold aqua bg:gray_3)'
deleted = '[âœک${count} ](bold red bg:gray_3)'
renamed = '[â†’ ](bold blue bg:gray_3)'
conflicted = '[âڑ‘ ](bold violet bg:gray_3)'
stashed = '[â‰،${count} ](bold pink bg:gray_3)'

ahead = '[â‡،${count} ](bold green bg:gray_3)'
behind = '[â‡£${count} ](bold red_deep bg:gray_3)'
diverged = '[â‡•â‡،${ahead_count}â‡£${behind_count} ](bold gold bg:gray_3)'

# -----------------------------
# DOCKER
# -----------------------------
[docker_context]
symbol = "ïŒˆ"
style = "bg:gray_4 fg:gray_1"
format = '[î‚¶](gray_4)[ $symbol $context ]($style)[î‚´ ](fg:gray_4)'

# -----------------------------
# COMMAND DURATION
# -----------------------------
[cmd_duration]
min_time = 2_000
format = '[$duration]($style) '
style = "bold gold"

# -----------------------------
# CHARACTER (prompt symbol)
# -----------------------------
[character]
success_symbol = "[â€¢](bold green)"
error_symbol = "[â€¢](bold red)"
vimcmd_symbol = "[â€¢](bold green)"
