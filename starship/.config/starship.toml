"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "dragon"

format = """
[](gray_1)\
$os\
$username\
[](fg:gray_1 bg:gray_2)\
$directory\
$git_branch\
$git_status\
${custom.gray2_close}\
$nodejs\
$bun\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$character\
"""

[palettes.dragon]
# grayscale prompt shell
gray_1 = "#F0F0F0"
gray_2 = "#B0B0B0"
gray_3 = "#707070"
docker_blue = "#1D63ED"
ink = "#0A0A0A"
ink_soft = "#111111"
# kanagawa-dragon ANSI palette, same hex Ghostty renders for this theme
green = "#87A987"     # ANSI 10 bright green (success)
yellow = "#C4B28A"    # ANSI 3 yellow
aqua = "#7AA89F"      # ANSI 14 bright cyan
red = "#E46876"       # ANSI 9 bright red (error)
red_deep = "#C4746E"  # ANSI 1 red
blue = "#7FB4CA"      # ANSI 12 bright blue
violet = "#938AA9"    # ANSI 13 bright magenta
gold = "#E6C384"      # ANSI 11 bright yellow
pink = "#A292A3"      # ANSI 5 magenta
# official brand colors — runtime pills
node_green = "#215732"
bun_black = "#000000"
python_blue = "#306998"
rust_orange = "#B7410E"
go_blue = "#375EAB"

# -----------------------------
# OS
# -----------------------------
[os]
disabled = false
style = "bg:gray_1 fg:ink"
format = '[$symbol]($style)'

[os.symbols]
Macos = ""
Ubuntu = ""
Windows = "󰍲"
Arch = ""
Fedora = ""
Debian = ""

# -----------------------------
# USERNAME
# -----------------------------
[username]
show_always = false
style_user = "bg:gray_1 fg:ink"
style_root = "bg:gray_1 fg:ink"
format = '[$user ]($style)'
disabled = false

# -----------------------------
# DIRECTORY
# -----------------------------
[directory]
style = "bg:gray_2 fg:ink_soft"
format = '[ $path ]($style)'
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_os_path_sep = true
home_symbol = "󰋜 ~"
truncation_symbol = "…/"

[directory.substitutions]
"Developer" = "󰲋 Developer"
"Projects" = "󱌣 Projects"
"Workspace" = "󱂬 Workspace"
"Code" = "󰨞 Code"
"Repos" = "󰳏 Repos"
"Documents" = "󱂷 Documents"
"Downloads" = "󰉍 Downloads"
"Music" = "󱍙 Music"
"Pictures" = "󰉏 Pictures"
"Desktop" = "󰟀 Desktop"
"dotfiles" = "󰒓 dotfiles"
".config" = "󱁿 .config"
".git" = "󰊢 .git"

# -----------------------------
# GIT
# -----------------------------
[git_branch]
symbol = ""
style = "bg:gray_3 fg:gray_1"
format = '[](fg:gray_2 bg:gray_3)[ $symbol $branch ]($style)'

[git_status]
style = "bg:gray_3"
format = '([$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style))[](fg:gray_3)'

staged = '[+${count} ](bold green bg:gray_3)'
modified = '[!${count} ](bold yellow bg:gray_3)'
untracked = '[?${count} ](bold aqua bg:gray_3)'
deleted = '[✘${count} ](bold red bg:gray_3)'
renamed = '[→ ](bold blue bg:gray_3)'
conflicted = '[⚑ ](bold violet bg:gray_3)'
stashed = '[≡${count} ](bold pink bg:gray_3)'

ahead = '[⇡${count} ](bold green bg:gray_3)'
behind = '[⇣${count} ](bold red_deep bg:gray_3)'
diverged = '[⇕⇡${ahead_count}⇣${behind_count} ](bold gold bg:gray_3)'

# -----------------------------
# GRAY_2 CLOSE
# rounds off the gray_2 pill when NOT in a git repo
# (in a repo, git_branch/git_status own the gray_3 caps instead)
# -----------------------------
[custom.gray2_close]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = '[](fg:gray_2)'

# -----------------------------
# LANGUAGE RUNTIMES (mise-managed)
# each is its own pill, brand color background + white foreground
# -----------------------------
[nodejs]
style = "bg:node_green fg:gray_1"
format = ' [](fg:node_green)[$symbol$version]($style)[](fg:node_green)'

[bun]
style = "bg:bun_black fg:gray_1"
format = ' [](fg:bun_black)[$symbol$version]($style)[](fg:bun_black)'

[python]
style = "bg:python_blue fg:gray_1"
format = ' [](fg:python_blue)[$symbol$version]($style)[](fg:python_blue)'

[rust]
style = "bg:rust_orange fg:gray_1"
format = ' [](fg:rust_orange)[$symbol$version]($style)[](fg:rust_orange)'

[golang]
style = "bg:go_blue fg:gray_1"
format = ' [](fg:go_blue)[$symbol$version]($style)[](fg:go_blue)'

# -----------------------------
# DOCKER
# -----------------------------
[docker_context]
symbol = ""
style = "bg:docker_blue fg:gray_1"
format = ' [](fg:docker_blue)[$symbol $context]($style)[](fg:docker_blue)'

# -----------------------------
# COMMAND DURATION
# -----------------------------
[cmd_duration]
min_time = 2_000
format = ' [$duration]($style)'
style = "bold gold"

# -----------------------------
# CHARACTER (prompt symbol)
# -----------------------------
[character]
success_symbol = ' [•](bold green)'
error_symbol = ' [•](bold red)'
vimcmd_symbol = ' [•](bold green)'
